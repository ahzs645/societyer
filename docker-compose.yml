# Local Convex backend + dashboard for Societyer.
#
# Images come from the official get-convex/convex-backend project:
#   https://github.com/get-convex/convex-backend
#
# Usage:
#   docker compose up -d
#   ./scripts/convex-admin-key.sh    # prints an admin key; paste into .env.local
#   npx convex dev                   # pushes schema + functions to localhost:3210

services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: societyer-convex-backend
    ports:
      - "3220:3210" # client API (what the Vite app talks to)
      - "3221:3211" # site proxy (http actions)
    environment:
      # Instance name is an arbitrary local identifier.
      - INSTANCE_NAME=societyer-local
      # Generated once on first boot and persisted in the volume.
      - INSTANCE_SECRET=${CONVEX_INSTANCE_SECRET:-4361726e6974617320636f6e766578206c6f63616c20736f6369657479657200}
      # Must match the host URL the browser will use.
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3220
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3221
      - DISABLE_BEACON=true
      - REDACT_LOGS_TO_CLIENT=false
    volumes:
      - convex-data:/convex/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3210/version || wget -qO- http://127.0.0.1:3210/version"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    container_name: societyer-convex-dashboard
    ports:
      - "6792:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:3220
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # S3-compatible object storage for society documents.
  # Alpha, Apache 2.0 licensed, drop-in MinIO replacement.
  # Console: http://127.0.0.1:9791 (default societyer/societyer-dev-secret for local dev only).
  rustfs:
    image: rustfs/rustfs:latest
    container_name: societyer-rustfs
    ports:
      - "9790:9000" # S3 API
      - "9791:9001" # Web console
    environment:
      - RUSTFS_ROOT_USER=${RUSTFS_ROOT_USER:-societyer}
      - RUSTFS_ROOT_PASSWORD=${RUSTFS_ROOT_PASSWORD:-societyer-dev-secret}
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    restart: unless-stopped

  # Zapier-like workflow runtime used by Societyer's native workflow bridge.
  # UI/API: http://127.0.0.1:5678
  n8n:
    image: n8nio/n8n:latest
    container_name: societyer-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=127.0.0.1
      - N8N_LISTEN_ADDRESS=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-societyer-local-n8n-encryption-key-32}
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - WEBHOOK_URL=${N8N_BASE_URL:-http://127.0.0.1:5678}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/Vancouver}
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped

volumes:
  convex-data:
  rustfs-data:
  rustfs-logs:
  n8n-data:
