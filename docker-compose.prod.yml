# Production-style local/server stack for Societyer.
#
# Build and start:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Deploy Convex functions after first boot:
#   CONVEX_SELF_HOSTED_URL=http://127.0.0.1:3220 npx convex dev --once
#
# Provider secrets (RESEND_*, STRIPE_*, TWILIO_*, WAVE_*, RUSTFS_*, OPENAI_API_KEY,
# ANTHROPIC_API_KEY, PAPERLESS_NGX_*) are read by Convex functions from the
# deployment env, not this compose file. Set them after boot, e.g.:
#   CONVEX_SELF_HOSTED_URL=http://127.0.0.1:3220 npx convex env set RESEND_API_KEY re_xxx
#
# The browser-connector stack (connector-runner + blitzbrowser) is NOT bundled
# here. To use connectors in this stack, run them separately and point the api
# service at the runner via CONNECTOR_RUNNER_BASE_URL (see the api service below).
#
services:
  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: societyer-prod-convex
    ports:
      - "3220:3210"
      - "3221:3211"
    environment:
      - INSTANCE_NAME=${CONVEX_INSTANCE_NAME:-societyer-prod}
      - INSTANCE_SECRET=${CONVEX_INSTANCE_SECRET:?Set CONVEX_INSTANCE_SECRET}
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3220}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3221}
      - DISABLE_BEACON=true
      - REDACT_LOGS_TO_CLIENT=true
    volumes:
      - convex-data:/convex/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3210/version || wget -qO- http://127.0.0.1:3210/version"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: societyer-api:local
    container_name: societyer-prod-api
    depends_on:
      convex:
        condition: service_healthy
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - AUTH_SERVER_PORT=8787
      - AUTH_MODE=${AUTH_MODE:-none}
      - CONVEX_SELF_HOSTED_URL=http://convex:3210
      - VITE_CONVEX_URL=http://convex:3210
      - SOCIETYER_API_PUBLIC_URL=${SOCIETYER_API_PUBLIC_URL:-http://127.0.0.1:8080}
      - BETTER_AUTH_BASE_URL=${BETTER_AUTH_BASE_URL:-http://127.0.0.1:8080}
      - AUTH_DB_PATH=/data/auth.sqlite
      - CONNECTOR_RUNNER_SECRET=${CONNECTOR_RUNNER_SECRET:-change-me-before-using-connectors}
      # Browser connectors are not bundled in this stack. Connector actions are
      # unavailable unless you run a connector-runner elsewhere and point at it
      # here (left unset, the api falls back to a localhost default that does
      # not resolve inside this container).
      - CONNECTOR_RUNNER_BASE_URL=${CONNECTOR_RUNNER_BASE_URL:-}
    volumes:
      - api-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_CONVEX_URL: ${PUBLIC_CONVEX_URL:-http://127.0.0.1:3220}
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-none}
    image: societyer-frontend:local
    container_name: societyer-prod-frontend
    restart: unless-stopped

  gateway:
    image: nginx:1.25-alpine
    container_name: societyer-prod-gateway
    depends_on:
      - frontend
      - api
    ports:
      - "8080:80"
    volumes:
      - ./docker/gateway.nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  convex-data:
  api-data:
