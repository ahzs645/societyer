<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: file: http: https:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:;"
    />
    <script>
      (function () {
        try {
          var preference = window.localStorage.getItem("societyer:theme") || "system";
          if (preference !== "light" && preference !== "dark" && preference !== "system") {
            preference = "system";
          }

          var resolvedTheme =
            preference === "system"
              ? window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : preference;

          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(resolvedTheme);
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch (error) {
          document.documentElement.classList.add("light");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="application-name" content="Societyer" />
    <meta name="apple-mobile-web-app-title" content="Societyer" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#111827" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Societyer — BC Societies Act compliance</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
