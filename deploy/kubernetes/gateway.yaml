apiVersion: v1
kind: ConfigMap
metadata:
  name: societyer-nginx-config
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      upstream frontend {
        server societyer-frontend:3000;
      }

      upstream api {
        server societyer-api:8787;
      }

      server {
        listen 80;
        server_name _;
        client_max_body_size 256m;

        location /api/ {
          proxy_pass http://api;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 86400s;
          proxy_send_timeout 86400s;
          proxy_buffering off;
        }

        location / {
          proxy_pass http://frontend;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: societyer-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: societyer-gateway
  template:
    metadata:
      labels:
        app: societyer-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: nginx-config
          configMap:
            name: societyer-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: societyer-gateway
spec:
  selector:
    app: societyer-gateway
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: societyer-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: societyer.k8s.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: societyer-gateway
                port:
                  number: 80
