apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: societyer-convex-data-local
  labels:
    app.kubernetes.io/name: societyer
    societyer.dev/storage-role: convex
spec:
  accessModes: ["ReadWriteOnce"]
  # Convex uses SQLite by default. Keep it on node-local block/filesystem
  # storage; NFS advisory locking caused the previous runtime to crash-loop.
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: societyer-api-data-local
  labels:
    app.kubernetes.io/name: societyer
    societyer.dev/storage-role: api
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
