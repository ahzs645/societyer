apiVersion: apps/v1
kind: Deployment
metadata:
  name: societyer-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: societyer-frontend
  template:
    metadata:
      labels:
        app: societyer-frontend
    spec:
      containers:
        - name: frontend
          # Registry manifest digest for the last deployed pre-upgrade image.
          # Replace with the tested release digest during promotion.
          image: ghcr.io/ahzs645/societyer-frontend@sha256:9e801dc8cde2cc592ed471c82b6448a6f42de350843a825649b13e20de4e123c
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: societyer-frontend
spec:
  selector:
    app: societyer-frontend
  ports:
    - port: 3000
      targetPort: 3000
