name: Build and push container images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ahzs645

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: societyer-api
            dockerfile: docker/api.Dockerfile
            build_args: ""
          - name: societyer-frontend
            dockerfile: docker/frontend.Dockerfile
            build_args: |
              VITE_CONVEX_URL=http://societyer.k8s.home:3220
              VITE_AUTH_MODE=none
          - name: societyer-connector-runner
            dockerfile: services/connector-runner/Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          TIMESTAMP=$(date +%s)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version_tag=main-${TIMESTAMP}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ steps.tags.outputs.version_tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:main
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
